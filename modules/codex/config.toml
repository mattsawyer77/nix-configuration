[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"

[tui]
theme = "1337"

[features]
prevent_idle_sleep = true
rmcp_client = true

[mcp_servers.GitLab]
url = "https://gitlab.com/api/v4/mcp"

