# installed via nix flake as the system-level Codex config
# writable user state such as trusted projects belongs in ~/.codex/config.toml
model_reasoning_effort = "high"
personality = "pragmatic"
model_provider = "f5ai"
# model = "Kimi-K2.5"
# model_context_window = 262000
# model_auto_compact_token_limit = 250000
model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 800000

[model_providers.f5ai]
name = "f5ai"
base_url = "https://f5ai.pd.f5net.com/openai"
model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 800000
# model = "Kimi-K2.5"
# model_context_window = 262000
# model_auto_compact_token_limit = 250000

[model_providers.haystack]
name = "haystack"
base_url = "http://haystack:4000/v1"
env_key = "CODEX_PROXY_MASTER_KEY"
model_supports_reasoning_summaries = false

[model_providers.local-ollama]
name = "local-ollama"
base_url = "http://localhost:11434/v1"
# model = "hf.co/unsloth/gemma-4-26B-A4B-it-GGUF:UD-Q8_K_XL"
model = "hf.co/unsloth/gemma-4-26B-A4B-it-GGUF:Q8_0"
model_context_window = 256000
model_auto_compact_token_limit = 200000

